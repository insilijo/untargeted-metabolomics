paths:
  raw_dir: data/raw
  interim_dir: data/interim
  processed_dir: data/processed
  figures_dir: figures
  reports_dir: reports

inputs:
  mix_glob: "MIX_*.mzML"       # legacy fallback when no sample_metadata sheet
  blank_glob: "BLANK_*.mzML"   # legacy fallback when no sample_metadata sheet
  sample_metadata: data/raw/sample_metadata.csv
  #   Required column : filename (mzML stem or full name)
  #   Required column : sample_type  (sample | blank | qc | other)
  #   Optional columns: batch, subject_id, group, timepoint, ...
  gnps_mgf: "ALL_GNPS.mgf"
  known_masses_csv: "KNOWN_MASSES.csv"
  gnps_sqlite: "gnps_library.sqlite"

ms2_extraction:
  precursor_mz_tolerance_ppm: 10.0
  min_ms2_peaks: 5
  min_intensity: 1000.0

feature_finding:
  noise_threshold_int: 1000.0
  mass_error_ppm: 10.0
  chrom_fwhm: 5.0
  chrom_peak_snr: 3.0
  min_trace_length: 5.0
  max_trace_length: -1.0

feature_alignment:
  mz_tolerance_ppm: 10.0
  rt_tolerance_sec: 10.0
  min_replicate_count: 2

blank_subtraction:
  mz_tolerance_ppm: 10.0
  rt_tolerance_sec: 10.0
  max_blank_to_sample_ratio: 0.2
  min_sample_intensity: 5000.0
  noise_floor_intensity: 100000.0

ms2_linking:
  mz_tolerance_ppm: 10.0
  rt_tolerance_sec: 10.0

adduct_filter:
  corr_threshold: 0.8
  rt_tolerance_sec: 10.0
  mz_tolerance_da: 0.01
  adduct_deltas:
    - label: C13 isotope
      delta_mz: 1.003355
    - label: Na-H
      delta_mz: 21.981943
    - label: K-H
      delta_mz: 37.955882
    - label: NH4-H
      delta_mz: 17.026549

library_search:
  mz_tolerance_da: 0.01
  min_cosine: 0.6
  top_n: 5

spec2mol:
  conda_env: spec2mol
  conda_exe: conda

squid:
  # Path to SQuID-InC root (overrides SQUID_INC_ROOT env var)
  # squid_root: ~/SQuID-INC
  anchor_set: results/anchors_v1.csv          # relative to squid_root
  graph_dir: data/processed/graph/tranches   # relative to squid_root
  min_cosine: 0.7          # minimum library match cosine to use as ground truth
  mz_tolerance_da: 0.01
  leiden_resolution: 1.0
  cross_community_damping: 0.5
  annotation_csv: data/raw/metabolon_annotations.csv
  #   Required column : mz (or mass / precursor_mz)
  #   Optional columns: rt, inchikey, smiles, name, ccs, ms2, confidence
  #   MS2 format      : [[mz,int],...] JSON  or  "mz:int;mz:int"  or  interleaved flat
